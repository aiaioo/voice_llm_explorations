<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-time Transcription</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ─────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #1e2130;
      flex-shrink: 0;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
    }

    .status {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 3px 10px;
      border-radius: 99px;
      background: #1e2130;
      color: #616161;
      transition: background 0.2s, color 0.2s;
    }
    .status.connecting { background: #1a2340; color: #64b5f6; }
    .status.active     {
      background: #0d2b1a;
      color: #4caf50;
      /* subtle pulse to indicate live */
      animation: pulse 2s ease-in-out infinite;
    }
    .status.error      { background: #2b0d0d; color: #ef5350; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.65; }
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }

    button {
      padding: 7px 18px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: default; }

    #btn-toggle          { background: #2563eb; color: #fff; }
    #btn-toggle:hover:not(:disabled) { background: #1d4ed8; }
    #btn-toggle.active   { background: #dc2626; }
    #btn-toggle.active:hover:not(:disabled) { background: #b91c1c; }

    #btn-clear           { background: #1e2130; color: #9e9e9e; }
    #btn-clear:hover:not(:disabled) { background: #262b3d; color: #e0e0e0; }

    /* ── transcript ─────────────────────────────────── */
    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty {
      color: #424242;
      font-size: 15px;
      margin: auto;
      text-align: center;
      line-height: 1.6;
    }
    .empty strong { color: #616161; }

    .seg {
      display: flex;
      gap: 14px;
      line-height: 1.65;
    }

    .lbl {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      min-width: 76px;
      padding-top: 3px;
      flex-shrink: 0;
    }

    .txt {
      font-size: 15px;
      color: #e0e0e0;
    }

    .interim .lbl { color: #424242; }
    .interim .txt { color: #4a4a4a; font-style: italic; }

    /* scrollbar */
    #transcript::-webkit-scrollbar       { width: 5px; }
    #transcript::-webkit-scrollbar-track { background: transparent; }
    #transcript::-webkit-scrollbar-thumb { background: #1e2130; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>Real-time Transcription</h1>
    <span id="status" class="status">Ready</span>
    <div class="controls">
      <button id="btn-toggle">Start</button>
      <button id="btn-clear">Clear</button>
    </div>
  </header>

  <div id="transcript">
    <p class="empty">Press <strong>Start</strong> to begin transcribing.</p>
  </div>

  <script src="/app.js"></script>
</body>
</html>
