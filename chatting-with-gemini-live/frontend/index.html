<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Live API - Vanilla JS Example</title>
  <style>
    :root {
      /* Google Brand Colors */
      --google-blue: #4285f4;
      --google-red: #db4437;
      --google-yellow: #f4b400;
      --google-green: #0f9d58;
    }

    body {
      font-family: Arial, sans-serif;
      transition: all 0.5s ease-in-out;
    }

    #setupJsonDisplay {
      background-color: #f4f4f4;
      padding: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
    }

    .user-transcript:before {
      content: "USER SPEECH: ";
      background-color: var(--google-yellow);
      color: black;
    }

    .user::before {
      content: "USER: ";
      background-color: var(--google-green);
      color: white;
    }

    .assistant:before {
      content: "GEMINI SPEECH: ";
      background-color: var(--google-blue);
      color: white;
    }

    .system:before {
      content: "SYSTEM: ";
      background-color: var(--google-red);
      color: white;
    }

    #mediaRow {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      margin: 8px 0;
    }

    #vizWrapper {
      display: flex;
      gap: 20px;
    }

    #volumeControl {
      text-align: center;
      margin: 8px 0;
    }

    #userSpeakingContainer,
    #aiSpeakingContainer {
      display: none; /* set to "flex" when active */
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    #userAudioViz {
      border-radius: 4px;
      background: #f0fff4;
    }

    #aiAudioViz {
      border-radius: 4px;
      background: #f0f4ff;
    }

    h1, h2 {
      text-align: center;
      margin: 20px 0;
    }

    #connectionStatus {
      text-align: center;
      margin: 8px 0;
    }

    #controlButtons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 16px 0;
    }

    .icon-btn {
      width: 52px;
      height: 52px;
      border: 2px solid #ccc;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .icon-btn:hover {
      background: #f5f5f5;
      border-color: #aaa;
    }

    .icon-btn.active {
      background: #fff0f0;
      border-color: var(--google-red);
      color: var(--google-red);
    }

    .icon-btn .stop-icon { display: none; }
    .icon-btn.active .start-icon { display: none; }
    .icon-btn.active .stop-icon { display: block; }

    #deviceSelectors {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 20px;
    }

    #deviceSelectors label {
      font-size: 0.9em;
    }
  </style>
</head>

<body>
  <h1>Gemini Flash Live - Multimodal LLM Test</h1>

  <div id="connectionStatus">Not connected <span id="debugInfo" style="display:none">Ready to connect...</span></div>

  <div id="mediaRow">
    <div id="vizWrapper">
      <div id="userSpeakingContainer">
        <span id="userSpeakingLabel">You speaking</span>
        <canvas id="userAudioViz" width="260" height="48"></canvas>
      </div>

      <div id="aiSpeakingContainer">
        <span id="aiSpeakingLabel">Gemini speaking</span>
        <canvas id="aiAudioViz" width="260" height="48"></canvas>
      </div>
    </div>

    <video id="videoPreview" autoplay playsinline muted hidden width="400"></video>
  </div>

  <div id="volumeControl">
    <label for="volume">Output volume:</label>
    <input type="range" id="volume" min="0" max="100" value="80" />
    <span id="volumeValue">80%</span>
  </div>

  <h2>Chat</h2>

  <div id="chatContainer" style="
        border: 1px solid;
        height: 300px;
        overflow-y: auto;
        padding: 10px;
      ">
    <div>Click the microphone icon to connect and start chatting</div>
  </div>

  <div id="controlButtons">
    <!-- Microphone -->
    <button id="startAudioBtn" class="icon-btn" title="Start microphone">
      <svg class="start-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      <svg class="stop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
        <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>

    <!-- Camera -->
    <button id="startVideoBtn" class="icon-btn" title="Start camera">
      <svg class="start-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"/>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      <svg class="stop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34"/>
        <polygon points="23 7 16 12 23 17 23 7"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    </button>

    <!-- Screen share -->
    <button id="startScreenBtn" class="icon-btn" title="Share screen">
      <svg class="start-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
        <polyline points="8 10 12 6 16 10"/>
        <line x1="12" y1="6" x2="12" y2="14"/>
      </svg>
      <svg class="stop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
        <line x1="8" y1="7" x2="16" y2="13"/>
        <line x1="16" y1="7" x2="8" y2="13"/>
      </svg>
    </button>
  </div>

  <!-- Device Selectors -->
  <div id="deviceSelectors">
    <div>
      <label for="micSelect">Microphone:</label><br />
      <select id="micSelect" style="width: 200px">
        <option value="">Default Microphone</option>
      </select>
    </div>
    <div>
      <label for="cameraSelect">Camera:</label><br />
      <select id="cameraSelect" style="width: 200px">
        <option value="">Default Camera</option>
      </select>
    </div>
  </div>

  <!-- Load libraries -->
  <script src="geminilive.js"></script>
  <script src="mediaUtils.js"></script>
  <script src="tools.js"></script>
  <script src="script.js"></script>
</body>

</html>
